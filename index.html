<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 聊天記帳</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══ DESIGN: Dark glassmorphism / terminal aesthetic ══ */
:root {
  --bg:        #0A0A14;
  --surface:   #12121F;
  --surface2:  #1A1A2E;
  --surface3:  #222238;
  --border:    rgba(139,92,246,.2);
  --border2:   rgba(139,92,246,.08);
  --purple:    #8B5CF6;
  --purple-l:  #A78BFA;
  --purple-d:  #6D28D9;
  --pink:      #EC4899;
  --teal:      #14B8A6;
  --green:     #10B981;
  --red:       #F87171;
  --amber:     #FBBF24;
  --text:      #E2E8F0;
  --text-m:    #94A3B8;
  --text-d:    #475569;
  --income:    #34D399;
  --expense:   #F87171;
  --cal:       #FBBF24;
  --glow:      rgba(139,92,246,.15);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Noto Sans TC','Space Grotesk',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;flex-direction:column;
}

/* ── Noise texture overlay ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

/* ── App shell ── */
.app{
  display:flex;flex-direction:column;height:100vh;
  max-width:900px;margin:0 auto;width:100%;
  position:relative;z-index:1;
}

/* ── Header ── */
.header{
  padding:16px 24px 14px;
  border-bottom:1px solid var(--border);
  background:rgba(10,10,20,.9);
  backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.header-brand{display:flex;align-items:center;gap:12px}
.logo{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 0 20px var(--glow);
}
.brand-text{
  font-family:'Space Grotesk',sans-serif;
  font-size:18px;font-weight:700;
  background:linear-gradient(90deg,var(--purple-l),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.brand-sub{font-size:11px;color:var(--text-d);letter-spacing:.08em;margin-top:1px}
.header-stats{display:flex;gap:20px;align-items:center}
.hstat{text-align:right}
.hstat-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600}
.hstat-lbl{font-size:10px;color:var(--text-d);letter-spacing:.06em;margin-top:1px}
.hstat-val.income{color:var(--income)}
.hstat-val.expense{color:var(--expense)}
.hstat-val.net-pos{color:var(--income)}
.hstat-val.net-neg{color:var(--expense)}
.sync-dot{
  width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);
  animation:pulse 2s infinite;
}
.sync-dot.syncing{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.sync-dot.error{background:var(--red);box-shadow:0 0 6px var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Tab bar ── */
.tab-bar{
  display:flex;padding:0 16px;
  border-bottom:1px solid var(--border2);
  background:rgba(18,18,31,.95);
  backdrop-filter:blur(12px);
  flex-shrink:0;gap:4px;
}
.tab{
  border:none;background:none;color:var(--text-d);
  padding:11px 18px;font-size:13px;font-weight:600;cursor:pointer;
  position:relative;transition:color .2s;white-space:nowrap;
  font-family:'Space Grotesk',sans-serif;
  display:flex;align-items:center;gap:6px;
}
.tab.active{color:var(--purple-l)}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:2px;background:linear-gradient(90deg,var(--purple),var(--pink));
  border-radius:2px 2px 0 0;
}

/* ── Main area ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── Chat panel ── */
.chat-panel{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  border-right:1px solid var(--border2);
}

/* ── Messages ── */
.messages{
  flex:1;overflow-y:auto;padding:20px 20px 8px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}

/* ── Message bubbles ── */
.msg{display:flex;gap:10px;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{
  width:32px;height:32px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.msg.bot .msg-avatar{background:linear-gradient(135deg,var(--purple),var(--pink))}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--teal),var(--green));font-size:12px}
.msg-body{max-width:72%}
.msg.user .msg-body{align-items:flex-end;display:flex;flex-direction:column}
.bubble{
  padding:11px 15px;border-radius:14px;font-size:14px;line-height:1.65;
  position:relative;
}
.msg.bot .bubble{
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:4px 14px 14px 14px;
  color:var(--text);
}
.msg.user .bubble{
  background:linear-gradient(135deg,var(--purple-d),var(--purple));
  border-radius:14px 4px 14px 14px;
  color:#fff;
}
.msg-time{font-size:10px;color:var(--text-d);margin-top:4px;font-family:'JetBrains Mono',monospace}
.msg.user .msg-time{text-align:right}

/* ── Record card (inside bot bubble) ── */
.record-card{
  background:var(--surface3);border-radius:10px;
  padding:12px 14px;margin-top:8px;
  border:1px solid var(--border);
  font-size:13px;
}
.record-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.record-row:last-child{margin-bottom:0}
.record-label{color:var(--text-d);font-size:11px;letter-spacing:.05em;font-family:'Space Grotesk'}
.record-amount{
  font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;
}
.record-amount.income{color:var(--income)}
.record-amount.expense{color:var(--expense)}
.record-cal{color:var(--cal);font-size:12px;display:flex;align-items:center;gap:4px;margin-top:4px}
.tag{
  display:inline-flex;align-items:center;gap:3px;
  border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;
  font-family:'Space Grotesk',sans-serif;
}
.tag-cat{background:rgba(139,92,246,.2);color:var(--purple-l)}
.tag-in{background:rgba(52,211,153,.15);color:var(--income)}
.tag-out{background:rgba(248,113,113,.15);color:var(--expense)}

/* ── Typing indicator ── */
.typing{display:flex;gap:5px;padding:12px 15px;align-items:center}
.typing span{
  width:7px;height:7px;border-radius:50%;
  background:var(--purple-l);opacity:.4;
  animation:bounce .9s infinite;
}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px);opacity:1}}

/* ── Input area ── */
.input-area{
  padding:14px 16px 16px;
  border-top:1px solid var(--border2);
  background:rgba(12,12,22,.98);
  flex-shrink:0;
}
.input-wrap{
  display:flex;gap:10px;align-items:flex-end;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:16px;padding:10px 12px;
  transition:border-color .2s,box-shadow .2s;
}
.input-wrap:focus-within{
  border-color:var(--purple);
  box-shadow:0 0 0 3px var(--glow);
}
.chat-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:15px;
  font-family:'Noto Sans TC',sans-serif;
  resize:none;max-height:360px;min-height:72px;line-height:1.5;
  scrollbar-width:none;
}
.chat-input::placeholder{color:var(--text-d)}
.chat-input::-webkit-scrollbar{display:none}
.input-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.icon-btn{
  border:none;background:none;cursor:pointer;
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;font-size:18px;
  color:var(--text-d);
}
.icon-btn:hover{background:var(--surface3);color:var(--text)}
.icon-btn.recording{background:rgba(248,113,113,.2);color:var(--red);animation:rec-pulse 1s infinite}
@keyframes rec-pulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 6px rgba(248,113,113,0)}}
.send-btn{
  border:none;cursor:pointer;
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--purple-d),var(--purple));
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 0 14px var(--glow);
}
.send-btn:hover{transform:scale(1.05);box-shadow:0 0 20px var(--glow)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn svg{width:16px;height:16px;fill:#fff}

/* ── Hint chips ── */
.hint-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.hint{
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text-m);border-radius:99px;padding:5px 12px;font-size:12px;
  cursor:pointer;transition:all .15s;font-family:'Space Grotesk',sans-serif;font-weight:500;
}
.hint:hover{border-color:var(--purple);color:var(--purple-l);background:rgba(139,92,246,.1)}

/* ── Side panel ── */
.side-panel{
  width:300px;flex-shrink:0;overflow-y:auto;
  background:var(--surface);
  display:flex;flex-direction:column;
}
.side-panel::-webkit-scrollbar{width:4px}
.side-panel::-webkit-scrollbar-thumb{background:var(--surface3)}
.side-section{padding:16px}
.side-title{
  font-size:11px;font-weight:700;letter-spacing:.1em;
  color:var(--text-d);text-transform:uppercase;margin-bottom:12px;
  font-family:'Space Grotesk',sans-serif;
}

/* ── Summary ring ── */
.budget-ring-wrap{text-align:center;padding:4px 0 16px}
.ring-svg{width:130px;height:130px}
.ring-track{fill:none;stroke:var(--surface3);stroke-width:12}
.ring-fill{fill:none;stroke-width:12;stroke-linecap:round;transform:rotate(-90deg);transform-origin:65px 65px;transition:stroke-dashoffset .8s ease}
.ring-fill.income{stroke:url(#ringGrad)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-wrap{position:relative;display:inline-block;width:130px}
.ring-label{font-size:11px;color:var(--text-d);margin-top:8px}
.ring-amount{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;margin-top:4px}

/* ── Summary stats ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.stat-box{
  background:var(--surface2);border-radius:10px;padding:12px;
  border:1px solid var(--border2);
}
.stat-box-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;margin-bottom:2px}
.stat-box-lbl{font-size:10px;color:var(--text-d);letter-spacing:.05em}

/* ── Record list in side ── */
.rec-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 0;border-bottom:1px solid var(--border2);
}
.rec-item:last-child{border-bottom:none}
.rec-icon{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
}
.rec-info{flex:1;min-width:0}
.rec-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-meta{font-size:10px;color:var(--text-d);margin-top:1px;font-family:'JetBrains Mono',monospace}
.rec-amt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;flex-shrink:0}
.rec-amt.income{color:var(--income)}
.rec-amt.expense{color:var(--expense)}

/* ── Mobile layout ── */
@media(max-width:700px){
  .side-panel{display:none}
  .chat-panel{border-right:none}
  .header-stats{gap:12px}
  .hstat{display:none}
  .hstat:last-child{display:block}
}
@media(max-width:480px){
  .messages{padding:14px 12px 6px}
  .input-area{padding:10px 12px 12px}
  .tab-bar{padding:0 8px}
  .tab{padding:10px 12px;font-size:12px}
}

/* ── Month selector ── */
.month-nav{
  display:flex;align-items:center;gap:8px;margin-bottom:20px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:14px;padding:6px 8px;
}
.month-btn{
  border:none;background:none;color:var(--text-d);cursor:pointer;
  width:32px;height:32px;border-radius:8px;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.month-btn:hover{background:var(--surface3);color:var(--text)}
.month-btn:disabled{opacity:.3;cursor:not-allowed}
.month-tabs{
  display:flex;gap:4px;overflow-x:auto;flex:1;
  scrollbar-width:none;
}
.month-tabs::-webkit-scrollbar{display:none}
.month-tab{
  border:none;background:none;color:var(--text-d);cursor:pointer;
  padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;
  white-space:nowrap;transition:all .2s;
  font-family:'Space Grotesk',sans-serif;
}
.month-tab:hover{background:var(--surface3);color:var(--text)}
.month-tab.active{
  background:linear-gradient(135deg,var(--purple-d),var(--purple));
  color:#fff;box-shadow:0 0 12px var(--glow);
}

/* ── Cal progress bar ── */
.cal-bar-wrap{margin-top:6px}
.cal-bar-track{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.cal-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--amber),var(--pink));transition:width .6s ease}
.cal-text{display:flex;justify-content:space-between;font-size:10px;color:var(--text-d);margin-top:3px;font-family:'JetBrains Mono',monospace}

/* ── GAS config warning ── */
.config-banner{
  background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);
  border-radius:10px;padding:10px 14px;font-size:12px;color:var(--amber);
  margin:10px 16px 0;flex-shrink:0;display:flex;gap:8px;align-items:flex-start;
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-brand">
      <div class="logo">💬</div>
      <div>
        <div class="brand-text">聊天記帳</div>
        <div class="brand-sub">說話 / 打字 即可記帳</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="hstat">
        <div class="hstat-val income" id="h_income">+$0</div>
        <div class="hstat-lbl">本月收入</div>
      </div>
      <div class="hstat">
        <div class="hstat-val expense" id="h_expense">-$0</div>
        <div class="hstat-lbl">本月支出</div>
      </div>
      <div class="hstat">
        <div class="hstat-val" id="h_net">$0</div>
        <div class="hstat-lbl">結餘</div>
      </div>
      <div class="sync-dot" id="sync_dot" title="同步狀態"></div>
    </div>
  </div>

  <!-- Config warning if GAS not set -->
  <div class="config-banner" id="config_warn" style="display:none">
    ⚠ 尚未設定 Google Apps Script URL，資料僅儲存在本地。請在程式碼中設定 GAS_URL。
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab active" onclick="setTab('chat',this)">💬 聊天記帳</button>
    <button class="tab" onclick="setTab('records',this)">📋 記錄列表</button>
    <button class="tab" onclick="setTab('stats',this)">📊 統計報表</button>
  </div>

  <!-- Main -->
  <div class="main" id="main_area">
    <!-- Chat panel -->
    <div class="chat-panel" id="chat_panel">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        
  

        </div>
        <div class="input-wrap">
          <textarea class="chat-input" id="chat_input" placeholder="輸入「早餐80元」、「薪水35000收入」…" rows="6"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <div class="input-actions">
            <button class="icon-btn" id="voice_btn" onclick="toggleVoice()" title="語音輸入">🎙</button>
            <button class="send-btn" id="send_btn" onclick="sendMessage()">
              <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Side panel -->
    <div class="side-panel" id="side_panel">
      <div class="side-section" style="border-bottom:1px solid var(--border2)">
        <div class="side-title">本月摘要</div>
        <div class="stat-grid">
          <div class="stat-box">
            <div class="stat-box-val income" id="s_income">$0</div>
            <div class="stat-box-lbl">收入</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-val expense" id="s_expense">$0</div>
            <div class="stat-box-lbl">支出</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-val" id="s_net" style="color:var(--purple-l)">$0</div>
            <div class="stat-box-lbl">結餘</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-val" id="s_count" style="color:var(--teal)">0</div>
            <div class="stat-box-lbl">筆數</div>
          </div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div style="font-size:11px;color:var(--text-d)">🔥 今日卡路里</div>
            <div id="s_cal" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--cal)">0 kcal</div>
          </div>
          <div class="cal-bar-wrap">
            <div class="cal-bar-track"><div class="cal-bar-fill" id="cal_bar" style="width:0%"></div></div>
            <div class="cal-text"><span>0</span><span id="cal_goal">目標 2000 kcal</span></div>
          </div>
        </div>
      </div>
      <div class="side-section" style="flex:1">
        <div class="side-title">最近紀錄</div>
        <div id="recent_list"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  ★ 請將 Google Apps Script 部署後的 URL 貼在這裡 ★
// ══════════════════════════════════════════════════════════
const GAS_URL = "https://script.google.com/macros/s/AKfycbz_vFlo0UyruY3znxhi2aQc4lYQ-I41qDQTf0b75EdtBvp79p_oWbv27MF1rufhob0e/exec";
// ══════════════════════════════════════════════════════════

const HAS_GAS = !GAS_URL.includes("YOUR_DEPLOYMENT");
if (!HAS_GAS) document.getElementById("config_warn").style.display="flex";

// ── JSONP ─────────────────────────────────────────────────
let _cn = 0;
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb  = "__bc" + (++_cn);
    const tid = setTimeout(() => { delete window[cb]; reject(new Error("timeout")); }, 12000);
    window[cb] = data => {
      clearTimeout(tid); delete window[cb];
      document.getElementById("_sc_"+cb)?.remove();
      resolve(data);
    };
    const qs = new URLSearchParams({ ...params, callback: cb }).toString();
    const el = document.createElement("script");
    el.id = "_sc_" + cb;
    el.src = GAS_URL + "?" + qs;
    el.onerror = () => { clearTimeout(tid); delete window[cb]; reject(new Error("network")); };
    document.head.appendChild(el);
  });
}
async function gas(params) {
  setSyncState("syncing");
  try {
    const r = await jsonp(params);
    setSyncState("ok"); return r;
  } catch(e) {
    setSyncState("error"); console.error(e);
    return { ok:false, error:e.message };
  }
}

function setSyncState(s) {
  const d = document.getElementById("sync_dot");
  if(!d) return;

function now() { const d=new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
function parseSheetTime(t) {
  if (!t) return "";
  const s = String(t);
  const iso = s.match(/T(\d{2}):(\d{2})/);
  if (iso) { const h = (parseInt(iso[1]) + 8) % 24; return h.toString().padStart(2,'0') + ":" + iso[2]; }
  const hm = s.match(/^(\d{1,2}):(\d{2})/);
  if (hm) return hm[1].padStart(2,'0') + ":" + hm[2];
  return s;
}
function today() { return new Date().toISOString().slice(0,10); }
function thisMonth() { return new Date().toISOString().slice(0,7); }
function fmt(n) { return Math.abs(n).toLocaleString(); }

// Returns all months that have records, plus current month, sorted desc
function getAvailableMonths() {
  const monthSet = new Set(records.map(r => r.date.slice(0,7)));
  monthSet.add(thisMonth());
  return Array.from(monthSet).sort((a,b) => b.localeCompare(a));
}

// Format "2026-05" → "2026年5月"
function fmtMonth(mon) {
  const [y,m] = mon.split("-");
  return y + "年" + parseInt(m) + "月";
}

// Build month selector HTML
function buildMonthNav(currentMon, tabName) {
  const months = getAvailableMonths();
  if (!months.includes(currentMon)) { months.push(currentMon); months.sort((a,b)=>b.localeCompare(a)); }
  const idx = months.indexOf(currentMon);
  const prevMon = months[idx+1] || "";
  const nextMon = months[idx-1] || "";
  return `
    <div class="month-nav">
      <button class="month-btn" ${!prevMon?"disabled":""} onclick="changeMonth('${prevMon}','${tabName}')">‹</button>
      <div class="month-tabs">
        ${months.map(m => `<button class="month-tab ${m===currentMon?"active":""}" onclick="changeMonth('${m}','${tabName}')">${fmtMonth(m)}</button>`).join("")}
      </div>
      <button class="month-btn" ${!nextMon?"disabled":""} onclick="changeMonth('${nextMon}','${tabName}')">›</button>
    </div>`;
}

function estimateCal(text) {
  const t = text.toLowerCase();
  let total = 0;
  let matched = [];
  // Try quantity x item
  for (const [food, cal] of Object.entries(CAL_DB)) {
    const re = new RegExp(`(\\d+)?\\s*${food}`, "g");
    const m  = t.match(re);
    if (m) {
      const qty = parseInt(m[0]) || 1;
      // Clamp qty to reasonable range
      const q   = (qty > 1 && qty < 20) ? qty : 1;
      total += cal * q;
      matched.push(food);
    }
  }
  return { calories: total, foods: matched };
}

// ── AI Text Parser ─────────────────────────────────────────
function parseInput(text) {
  const t = text.trim();

  // Amount extraction: support 元、塊、NT、$
  const amtMatch = t.match(/[\$＄]?(\d+(?:\.\d+)?)\s*(?:元|塊|NT|ntd)?/i);
  const amount   = amtMatch ? parseFloat(amtMatch[1]) : null;

  // Type detection: income keywords
  const incomeKW = ["收入","薪水","薪資","獎金","紅包","利息","退款","報銷","入帳","進帳","賺","盈","補貼","津貼","稿費","版稅"];
  const isIncome = incomeKW.some(k => t.includes(k));
  const type     = isIncome ? "收入" : "支出";

  // Category detection
  let category = "其他";
  let subCat   = "";
  const catMap = [
    { cat:"餐飲", subs:["早餐","午餐","晚餐","宵夜","點心","便當","飯","麵","小吃","外食","餐廳","火鍋","燒肉","壽司","牛排","泡麵"] },
    { cat:"飲料", subs:["咖啡","奶茶","珍奶","飲料","手搖","茶","拿鐵","可樂","果汁","豆漿"] },
    { cat:"交通", subs:["捷運","公車","計程車","油費","加油","停車","高鐵","火車","ubike","Uber","計程","機票"] },
    { cat:"購物", subs:["超市","賣場","網購","衣服","鞋子","包包","3C","電腦","手機","家電","書","文具"] },
    { cat:"娛樂", subs:["電影","KTV","遊戲","旅遊","旅行","唱歌","演唱會","展覽","Netflix","訂閱"] },
    { cat:"醫療", subs:["藥","醫院","診所","健保","保險","看診","掛號"] },
    { cat:"運動", subs:["健身","游泳","跑步","球","瑜伽","gym","運動"] },
    { cat:"日用品", subs:["洗髮","沐浴","衛生紙","清潔","洗碗","日用"] },
    { cat:"住宿", subs:["房租","水費","電費","瓦斯","網路","手機費","租金","管理費"] },
    { cat:"薪資", subs:["薪水","薪資","薪"] },
    { cat:"獎金", subs:["獎金","紅包","年終","業績"] },
    { cat:"投資", subs:["股票","基金","ETF","投資","定存","數位帳戶"] },
  ];

  for (const { cat, subs } of catMap) {
    for (const sub of subs) {
      if (t.includes(sub)) {
        category = cat; subCat = sub; break;
      }
    }
    if (category !== "其他") break;
  }
  // Override with income type
  if (isIncome && ["薪水","薪資"].some(k=>t.includes(k))) { category = "薪資"; }
  else if (isIncome && ["獎金","紅包"].some(k=>t.includes(k))) { category = "獎金"; }

  // Description: remove amount, keep rest
  const desc = t.replace(/[\$＄]?\d+(?:\.\d+)?\s*(?:元|塊|NT|ntd)?/gi,"").replace(/\s+/g," ").trim() || t;

  // Calorie: only for food categories
  const foodCats = ["餐飲","飲料"];
  let calories = 0;
  let calFoods = [];
  if (foodCats.includes(category)) {
    const est  = estimateCal(t);
    calories   = est.calories;
    calFoods   = est.foods;
  }

  return { amount, type, category, subCat, desc, calories, calFoods, raw: text };
}

// ── Send ───────────────────────────────────────────────────
async function sendMessage() {
  const inp = document.getElementById("chat_input");
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = "";
  autoResize(inp);

  addMsg("user", escHtml(txt));
  showTyping();

  // Short delay to feel natural
  await new Promise(r => setTimeout(r, 600 + Math.random()*400));

  const parsed = parseInput(txt);

  if (!parsed.amount === null) {
    removeTyping();
    // General Q&A fallback
    addMsg("bot", `<span style="color:var(--text-m)">🤔 抱歉，我沒有找到金額資訊。</span><br>請試試像這樣說：<br><code style="color:var(--purple-l);font-size:12px">「午餐便當85元」「薪水50000收入」</code>`);
    return;
  }

  removeTyping();

  // Build response
  let calHtml = "";
  if (parsed.calories > 0) {
    const pct = Math.min(100, Math.round(parsed.calories / CAL_GOAL * 100));
    calHtml = `<div class="record-cal">🔥 約 <strong>${parsed.calories} kcal</strong>（${pct}% 每日建議）</div>`;
  } else if (["餐飲","飲料"].includes(parsed.category)) {
    calHtml = `<div class="record-cal" style="color:var(--text-d)">🔥 卡路里：無法估算</div>`;
  }

  const cardHtml = `
    <div class="record-card">
      <div class="record-row">
        <span class="tag ${parsed.type==="收入"?"tag-in":"tag-out"}">${parsed.type==="收入"?"↑ 收入":"↓ 支出"}</span>
        <span class="record-amount ${parsed.type==="收入"?"income":"expense"}">${parsed.type==="收入"?"+":"-"}$${fmt(parsed.amount)}</span>
      </div>
      <div class="record-row" style="margin-top:4px">
        <span class="tag tag-cat">${catIcon(parsed.category)} ${parsed.category}${parsed.subCat?" · "+parsed.subCat:""}</span>
        <span style="font-size:12px;color:var(--text-m)">${parsed.desc.slice(0,20)}</span>
      </div>
      ${calHtml}
    </div>`;

  const replyTxt = parsed.type === "收入"
    ? `✅ 已記錄收入！`
    : `✅ 已記錄支出！`;

  addMsg("bot", `${replyTxt}${cardHtml}`);

  // Save locally
  const rec = {
    date: today(), time: now(),
    category: parsed.category, subCat: parsed.subCat,
    desc: parsed.desc, amount: parsed.amount,
    type: parsed.type, calories: parsed.calories,
    inputMode: "文字", raw: parsed.raw,
  };
  records.unshift(rec);
  updateStats();
  renderSideRecent();

  // Sync to GAS
  if (HAS_GAS) {
    gas({
      action: "addRecord",
      category:  parsed.category,
      subCat:    parsed.subCat,
      desc:      parsed.desc,
      amount:    parsed.amount,
      type:      parsed.type,
      calories:  parsed.calories,
      inputMode: "文字",
      raw:       parsed.raw,
    }).then(r => {
      if (!r?.ok) console.warn("GAS sync failed", r?.error);
    });
  }
}

// ── Voice Input ────────────────────────────────────────────
function toggleVoice() {
  if (!("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) {
    addMsg("bot", "⚠ 您的瀏覽器不支援語音輸入，請改用 Chrome。");
    return;
  }
  if (isRecording) {
    recognition?.stop();
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = "zh-TW";
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart  = () => {
    isRecording = true;
    document.getElementById("voice_btn").className = "icon-btn recording";
    document.getElementById("voice_btn").textContent = "🔴";
    document.getElementById("chat_input").placeholder = "🎙 聆聽中…";
  };
  recognition.onresult = e => {
    const transcript = Array.from(e.results).map(r=>r[0].transcript).join("");
    document.getElementById("chat_input").value = transcript;
    autoResize(document.getElementById("chat_input"));
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById("voice_btn").className = "icon-btn";
    document.getElementById("voice_btn").textContent = "🎙";
    document.getElementById("chat_input").placeholder = "輸入「早餐80元」、「薪水35000收入」…";
    const val = document.getElementById("chat_input").value.trim();
    if (val) sendMessage();
  };
  recognition.onerror = e => {
    isRecording = false;
    document.getElementById("voice_btn").className = "icon-btn";
    document.getElementById("voice_btn").textContent = "🎙";
    if (e.error !== "aborted") addMsg("bot", `⚠ 語音辨識錯誤：${e.error}`);
  };
  recognition.start();
}

// ── Stats ──────────────────────────────────────────────────
function updateStats() {
  const mon = thisMonth();
  const m   = records.filter(r => r.date.startsWith(mon));
  const inc = m.filter(r=>r.type==="收入").reduce((s,r)=>s+r.amount,0);
  const exp = m.filter(r=>r.type==="支出").reduce((s,r)=>s+r.amount,0);
  const net = inc - exp;

  document.getElementById("h_income").textContent  = "+$"+fmt(inc);
  document.getElementById("h_expense").textContent = "-$"+fmt(exp);
  const netEl = document.getElementById("h_net");
  netEl.textContent  = (net>=0?"+":"-")+"$"+fmt(net);
  netEl.className    = "hstat-val "+(net>=0?"net-pos":"net-neg");

  document.getElementById("s_income").textContent  = "$"+fmt(inc);
  document.getElementById("s_expense").textContent = "$"+fmt(exp);
  const sNet = document.getElementById("s_net");
  sNet.textContent  = (net>=0?"+":"-")+"$"+fmt(net);
  sNet.style.color  = net>=0?"var(--income)":"var(--expense)";
  document.getElementById("s_count").textContent   = m.length;

  // Calories (today)
  const todayCal = records.filter(r=>r.date===today()).reduce((s,r)=>s+(r.calories||0),0);
  document.getElementById("s_cal").textContent = todayCal+" kcal";
  const pct = Math.min(100,Math.round(todayCal/CAL_GOAL*100));
  document.getElementById("cal_bar").style.width = pct+"%";
}

  main.innerHTML = `
    <div style="flex:1;overflow-y:auto;padding:24px;max-width:700px;margin:0 auto;width:100%">
      <div style="font-size:20px;font-weight:700;margin-bottom:4px;font-family:'Space Grotesk'">📊 統計報表</div>
      <div style="font-size:13px;color:var(--text-d);margin-bottom:16px">選擇月份查看統計</div>
      ${buildMonthNav(mon, "stats")}

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px">
        ${[
          {lbl:"收入",val:"$"+fmt(inc),c:"var(--income)"},
          {lbl:"支出",val:"$"+fmt(exp),c:"var(--expense)"},
          {lbl:"結餘",val:(inc-exp>=0?"+":"-")+"$"+fmt(inc-exp),c:inc-exp>=0?"var(--income)":"var(--expense)"},
        ].map(s=>`<div style="background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:16px;text-align:center">
          <div style="font-family:'JetBrains Mono';font-size:20px;font-weight:700;color:${s.c}">${s.val}</div>
          <div style="font-size:11px;color:var(--text-d);margin-top:4px">${s.lbl}</div>
        </div>`).join("")}
      </div>

      ${todayCal > 0 ? `
      <div style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:14px;padding:16px;margin-bottom:24px">
        <div style="font-size:13px;font-weight:700;color:var(--cal);margin-bottom:10px">🔥 今日熱量攝取</div>
        <div style="font-family:'JetBrains Mono';font-size:26px;font-weight:700;color:var(--cal);margin-bottom:8px">${todayCal} kcal</div>
        <div style="height:6px;background:var(--surface3);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${Math.min(100,todayCal/CAL_GOAL*100)}%;background:linear-gradient(90deg,var(--amber),var(--pink));border-radius:3px;transition:width .6s"></div>
        </div>
        <div style="font-size:11px;color:var(--text-d);margin-top:4px">每日建議攝取：${CAL_GOAL} kcal（${Math.round(todayCal/CAL_GOAL*100)}%）</div>
      </div>` : ""}

      ${catList.length ? `
      <div style="background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:20px">
        <div style="font-size:13px;font-weight:700;color:var(--text-m);margin-bottom:16px">💸 支出類別分析</div>
        ${catList.map(([cat,amt])=>`
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px">
              <span style="font-size:13px">${catIcon(cat)} ${cat}</span>
              <span style="font-family:'JetBrains Mono';font-size:13px;font-weight:600;color:var(--expense)">$${fmt(amt)}</span>
            </div>
            <div style="height:5px;background:var(--surface3);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${Math.round(amt/maxAmt*100)}%;background:linear-gradient(90deg,var(--purple-d),var(--purple-l));border-radius:3px"></div>
            </div>
          </div>`).join("")}
      </div>` : `<div style="text-align:center;color:var(--text-d);padding:40px">${fmtMonth(mon)}尚無支出記錄</div>`}
    </div>`;
}

// ── Welcome message ────────────────────────────────────────
function welcome() {
  const hr = new Date().getHours();
  const greet = hr<12?"早安 ☀":"午安 🌤";
  addMsg("bot", `
    ${greet}！我是你的<strong style="color:var(--purple-l)">AI 記帳助手`
  );
}

// ── Load from GAS on start ─────────────────────────────────
async function loadFromGAS() {
  if (!HAS_GAS) return;
  // Load all records (no month filter) so all months are available
  const r = await gas({ action:"getRecords" });
  if (r?.ok && r.data?.length) {
    r.data.forEach(d => records.push({
      date: d.date, time: parseSheetTime(d.time),
      category: d.category, subCat: d.subCat,
      desc: d.desc, amount: d.amount,
      type: d.type, calories: d.calories,
      inputMode: d.inputMode, raw: d.raw,
    }));
    updateStats();
    renderSideRecent();
  }
}

// ── Init ───────────────────────────────────────────────────
welcome();
loadFromGAS();
updateStats();
renderSideRecent();
</script>
</body>
</html>
